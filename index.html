<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>鳥類心理測驗</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="images/logo.png" alt="網站Logo" id="site-logo">
                <span>鳥類心理測驗</span> 
            </div>
            <nav class="nav-links">
                <a href="#" onclick="showAbout()">關於我們</a>
                <a href="#">八種鳥類介紹</a>
            </nav>
        </div>
    </header>

    <div id="app">
        <div id="about-screen" style="display: none;">
            <h2>第十組</h2>
            <div class="team-photo-container">
                <img src="images/team.png" alt="團隊合照" id="team-photo">
            </div>
            <p class="team-names">陳奕豪 ｜ 許詠宜 ｜ 賴彥錞 ｜ 葉佳璇 ｜ 許柏恩</p>
            <button onclick="goBack()" class="back-btn">返回</button>
        </div>
        
        <div id="start-screen">
            <h1>歡迎來到鳥類心理測驗</h1>
            <p>簡單幾題，測出你的潛在人格！</p>
            <button onclick="nextStep()" class="primary-btn">開始測驗</button>
        </div>

        <div id="quiz-screen" style="display: none;">
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>

            <h2 id="question-text">題目載入中...</h2>
            <div id="options-container"></div>
        </div>

        <div id="result-screen" style="display: none;">
            <h2>你的測驗結果</h2>
            <div class="card" id="result-card" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="card-front">
                        <div class="bird-photo-container">
                            <img id="bird-img" src="" alt="鳥類照片">
                        </div>
                        <h3 id="result-name-front" class="bird-name-title">鳥名載入中</h3>
                        <p class="click-hint">點擊翻轉查看詳細資訊</p>
                    </div>
                    <div class="card-back">
                        <div class="bird-info-box">
                            <h3 id="result-name-back">鳥名</h3>
                            <div id="bird-detail-content"></div>
                        </div>
                        <div class="card-footer">
                            <a id="spectrogram-link" href="#" class="footer-link">🎵 查看聲譜圖</a>
                            <a href="https://www.google.com/search?q=清華大學鳥類" target="_blank" class="footer-link">📖 了解更多</a>
                        </div>
                    </div>
                </div>
            </div>
            <button onclick="location.reload()" class="primary-btn" style="margin-top: 25px;">重新測驗</button>
        </div>
    </div>

    <div id="spectrogram-modal" class="modal" onclick="closeSpectrogram()">
        <div class="modal-content">
            <img id="modal-img" src="" alt="聲譜圖放大">
            <p style="color: white; margin-top: 10px; font-weight:bold;">點擊任何地方關閉</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
